<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Starlit Atoll</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #010a18; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(100,200,255,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(80,180,220,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🌊 STARLIT ATOLL ✨</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010a18);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 10, 50);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minDistance = 5;
controls.maxDistance = 80;

scene.add(new THREE.AmbientLight(0x051525, 0.4));

// Deep ocean floor
const oceanFloor = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200, 100, 100),
  new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5); }
      void main() {
        float n = hash(floor(vUv * 30.0)) * 0.06;
        vec3 col = vec3(0.0, 0.03, 0.08) + n;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  })
);
oceanFloor.rotation.x = -Math.PI / 2;
oceanFloor.position.y = -30;
scene.add(oceanFloor);

// Atoll ring
const atollGeo = new THREE.RingGeometry(12, 20, 48);
const atollMat = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5); }
    void main() {
      float n = hash(floor(vUv * 30.0)) * 0.1;
      vec3 col = vec3(0.65, 0.58, 0.4) + n;
      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const atoll = new THREE.Mesh(atollGeo, atollMat);
atoll.rotation.x = -Math.PI / 2;
atoll.position.y = -2;
scene.add(atoll);

// Shallow lagoon inside atoll
const lagoonGeo = new THREE.CircleGeometry(11.5, 48);
const lagoonMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    void main() {
      float ripple = sin(length(vUv - 0.5) * 25.0 + uTime * 0.8) * 0.04;
      vec3 col = mix(vec3(0.02, 0.2, 0.35), vec3(0.05, 0.35, 0.5), ripple + 0.5);
      gl_FragColor = vec4(col, 0.88);
    }
  `
});
const lagoon = new THREE.Mesh(lagoonGeo, lagoonMat);
lagoon.rotation.x = -Math.PI / 2;
lagoon.position.y = -1;
lagoon.userData.isLagoon = true;
scene.add(lagoon);

// Coral formations inside lagoon
const coralColors = [0xff6688, 0xffaa66, 0x66ffaa, 0xaa66ff, 0xffff66];
for (let c = 0; c < 30; c++) {
  const angle = Math.random() * Math.PI * 2;
  const rDist = 2 + Math.random() * 8;
  const cx = Math.cos(angle) * rDist;
  const cz = Math.sin(angle) * rDist;
  const color = coralColors[Math.floor(Math.random() * 5)];
  
  const coral = new THREE.Mesh(
    new THREE.DodecahedronGeometry(0.5 + Math.random() * 1.2, 0),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.8 })
  );
  coral.position.set(cx, -1 + coral.geometry.parameters.radius, cz);
  coral.rotation.set(Math.random(), Math.random(), Math.random());
  scene.add(coral);
}

// Palm trees on atoll
for (let p = 0; p < 12; p++) {
  const angle = (p / 12) * Math.PI * 2;
  const pr = 14 + Math.random() * 4;
  const px = Math.cos(angle) * pr;
  const pz = Math.sin(angle) * pr;
  
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.4, 8 + Math.random() * 4, 10),
    new THREE.MeshStandardMaterial({ color: 0x5a3a15 })
  );
  trunk.position.set(px, 3, pz);
  trunk.rotation.z = (Math.random() - 0.5) * 0.4;
  scene.add(trunk);
  
  for (let f = 0; f < 6; f++) {
    const fAngle = (f / 6) * Math.PI * 2;
    const frond = new THREE.Mesh(
      new THREE.ConeGeometry(0.2, 4 + Math.random() * 2, 4),
      new THREE.MeshStandardMaterial({ color: 0x1a5a08 })
    );
    frond.position.set(
      px + Math.cos(fAngle) * 1.5,
      8 + Math.random() * 2,
      pz + Math.sin(fAngle) * 1.5
    );
    frond.rotation.z = 0.6 + Math.random() * 0.4;
    frond.rotation.y = -fAngle;
    scene.add(frond);
  }
}

// Bioluminescent waves outside atoll
const waveCount = 300;
const wavePos = new Float32Array(waveCount * 3);
for (let i = 0; i < waveCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 18 + Math.random() * 40;
  wavePos[i*3] = Math.cos(theta) * r;
  wavePos[i*3+1] = -2 + Math.random() * 4;
  wavePos[i*3+2] = Math.sin(theta) * r;
}
const waveGeo = new THREE.BufferGeometry();
waveGeo.setAttribute('position', new THREE.BufferAttribute(wavePos, 3));
const waveMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.y += sin(uTime * 0.8 + position.x * 0.1) * 1.5;
      p.y += cos(uTime * 0.6 + position.z * 0.1) * 1.0;
      gl_PointSize = 20.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - d * 2.0) * 0.5;
      vec3 col = vec3(0.1, 0.6, 0.9);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const waves = new THREE.Points(waveGeo, waveMat);
waves.userData.isWaves = true;
scene.add(waves);

// Fish in lagoon
const fishColors = [0xff6644, 0xffaa22, 0x44aaff, 0xff44aa, 0x44ffaa];
for (let f = 0; f < 20; f++) {
  const fish = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshStandardMaterial({ 
      color: fishColors[Math.floor(Math.random() * 5)], 
      emissive: fishColors[Math.floor(Math.random() * 5)],
      emissiveIntensity: 0.5
    })
  );
  fish.scale.set(1, 0.4, 2);
  fish.position.set(
    (Math.random() - 0.5) * 18,
    -0.5 + Math.random() * 1.5,
    (Math.random() - 0.5) * 18
  );
  fish.userData.fishPhase = Math.random() * Math.PI * 2;
  fish.userData.isFish = true;
  scene.add(fish);
}

// Jellyfish
for (let j = 0; j < 10; j++) {
  const jelly = new THREE.Group();
  
  const bell = new THREE.Mesh(
    new THREE.SphereGeometry(0.8, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshStandardMaterial({ color: 0xaa88ff, transparent: true, opacity: 0.5, emissive: 0x6644cc, emissiveIntensity: 1.0 })
  );
  bell.rotation.x = Math.PI;
  jelly.add(bell);
  
  // Tentacles
  for (let t = 0; t < 8; t++) {
    const tent = new THREE.Mesh(
      new THREE.CylinderGeometry(0.02, 0.05, 3 + Math.random() * 2, 6),
      new THREE.MeshStandardMaterial({ color: 0xaa88ff, transparent: true, opacity: 0.4 })
    );
    const angle = (t / 8) * Math.PI * 2;
    tent.position.set(Math.cos(angle) * 0.5, -2, Math.sin(angle) * 0.5);
    jelly.add(tent);
  }
  
  jelly.position.set(
    (Math.random() - 0.5) * 16,
    0 + j * 0.5,
    (Math.random() - 0.5) * 16
  );
  jelly.userData.jellyPhase = Math.random() * Math.PI * 2;
  jelly.userData.isJelly = true;
  scene.add(jelly);
}

// Stars above
const starCount = 2500;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 200 + Math.random() * 100;
  starPos[i*3] = Math.cos(theta) * r;
  starPos[i*3+1] = 50 + Math.random() * 100;
  starPos[i*3+2] = Math.sin(theta) * r;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 })));

// Milky way band
const milkyGeo = new THREE.PlaneGeometry(400, 60);
const milkyMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    void main() {
      float n = fract(sin(dot(vUv * vec2(50.0, 10.0) + uTime * 0.05, vec2(12.9898, 78.233))) * 43758.5453);
      float band = exp(-pow((vUv.y - 0.5) * 8.0, 2.0));
      vec3 col = vec3(0.15, 0.1, 0.25) * band + n * 0.03;
      float alpha = band * 0.6 + n * 0.1;
      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true, depthWrite: false
});
const milky = new THREE.Mesh(milkyGeo, milkyMat);
milky.position.set(0, 80, -150);
milky.rotation.x = 0.2;
milky.userData.isMilky = true;
scene.add(milky);

// Moon reflection on water
const moonRef = new THREE.Mesh(
  new THREE.CircleGeometry(3, 24),
  new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      void main() {
        float d = length(vUv - 0.5) * 2.0;
        float shimmer = sin(d * 20.0 - uTime * 3.0) * 0.1;
        vec3 col = vec3(0.8, 0.85, 0.7) + shimmer;
        float a = (1.0 - d) * 0.5;
        gl_FragColor = vec4(col, a);
      }
    `
  })
);
moonRef.rotation.x = -Math.PI / 2;
moonRef.position.set(0, -0.8, 0);
moonRef.userData.isMoonRef = true;
scene.add(moonRef);

// Tiny sandbar island with hut
const hut = new THREE.Mesh(
  new THREE.ConeGeometry(3, 3, 8),
  new THREE.MeshStandardMaterial({ color: 0x8a6a44 })
);
hut.position.set(15, 1, 10);
hut.rotation.y = 0.5;
scene.add(hut);

const hutFloor = new THREE.Mesh(
  new THREE.BoxGeometry(4, 0.3, 3),
  new THREE.MeshStandardMaterial({ color: 0x5a3a15 })
);
hutFloor.position.set(15, 0.15, 10);
scene.add(hutFloor);

// Seashells on atoll beach
const shellColors = [0xffccaa, 0xffe4cc, 0xffddaa, 0xeeeeff];
for (let s = 0; s < 40; s++) {
  const angle = Math.random() * Math.PI * 2;
  const sDist = 12 + Math.random() * 7;
  
  const shell = new THREE.Mesh(
    new THREE.SpiralGeometry(0.15, 0.5, 12, 6),
    new THREE.MeshStandardMaterial({ color: shellColors[Math.floor(Math.random() * 4)] })
  );
  shell.position.set(
    Math.cos(angle) * sDist,
    -1.5,
    Math.sin(angle) * sDist
  );
  shell.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  scene.add(shell);
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  if (lagoon.userData.isLagoon && lagoon.material.uniforms.uTime) lagoon.material.uniforms.uTime.value = t;
  if (waves.userData.isWaves) waves.material.uniforms.uTime.value = t;
  if (milky.userData.isMilky && milky.material.uniforms.uTime) milky.material.uniforms.uTime.value = t;
  if (moonRef.userData.isMoonRef && moonRef.material.uniforms.uTime) moonRef.material.uniforms.uTime.value = t;
  
  scene.children.forEach(child => {
    if (child.userData.isFish) {
      const ph = child.userData.fishPhase;
      child.position.x = Math.sin(t * 0.4 + ph) * 7;
      child.position.z = Math.cos(t * 0.3 + ph) * 7;
      child.rotation.y = t + ph;
    }
    if (child.userData.isJelly) {
      const ph = child.userData.jellyPhase;
      child.position.y += Math.sin(t * 0.3 + ph) * 0.01;
      child.position.x += Math.sin(t * 0.1 + ph) * 0.008;
      child.position.z += Math.cos(t * 0.1 + ph) * 0.008;
    }
  });
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
